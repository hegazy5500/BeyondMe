<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BeyondMe</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #0f172a;
      color: white;
    }

    header {
      padding: 20px;
    }

    #usernameDisplay {
      font-size: 22px;
      margin-bottom: 10px;
    }

    #statusDisplay {
      font-size: 14px;
      color: #aaa;
      margin-bottom: 20px;
    }

    button {
      padding: 15px 25px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      background: #22c55e;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

<header>
  <div id="usernameDisplay">Not logged in</div>
  <div id="statusDisplay">Initializing...</div>

  <button id="payBtn">Support 1 Pi</button>
</header>

<script>
document.addEventListener("DOMContentLoaded", async () => {

  const usernameEl = document.getElementById("usernameDisplay");
  const statusEl = document.getElementById("statusDisplay");
  const payBtn = document.getElementById("payBtn");

  if (typeof Pi === "undefined") {
    statusEl.textContent = "❌ Open inside Pi Browser";
    return;
  }

  Pi.init({ version: "2.0" });

  try {
    const scopes = ['payments'];

    const auth = await Pi.authenticate(scopes, (payment) => {
      console.log("Incomplete payment:", payment);
    });

    usernameEl.textContent = "👤 " + auth.user.username;
    statusEl.textContent = "✅ Logged in";

    // 💰 Payment
    payBtn.addEventListener("click", () => {

      Pi.createPayment({
        amount: 1,
        memo: "Support BeyondMe App",
        metadata: { type: "support" }
      }, {
        onReadyForServerApproval: function(paymentId) {
          statusEl.textContent = "⏳ Waiting approval...";
          console.log(paymentId);
        },
        onReadyForServerCompletion: function(paymentId, txid) {
          statusEl.textContent = "✅ Payment completed";
          console.log(txid);
        },
        onCancel: function(paymentId) {
          statusEl.textContent = "❌ Payment cancelled";
        },
        onError: function(error, payment) {
          statusEl.textContent = "⚠️ Payment error";
          console.error(error);
        }
      });

    });

  } catch (e) {
    statusEl.textContent = "❌ Auth failed";
    console.error(e);
  }

});
</script>

<!-- ✅ Pi SDK في الآخر -->
<script src="https://sdk.minepi.com/pi-sdk.js"></script>

</body>
</html>
